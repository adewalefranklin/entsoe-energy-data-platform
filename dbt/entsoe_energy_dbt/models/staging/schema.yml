version: 2

models:
  - name: silver_actual_generation
    description: "Cleaned and standardized actual generation data from ENTSO-E."
    columns:
      - name: generation_date
        description: "Date extracted from the generation period start timestamp."
        tests:
          - not_null

      - name: production_type
        description: "Type of electricity production, for example solar, wind, hydro, or fossil fuel."
        tests:
          - not_null

      - name: generation_mw
        description: "Actual generated electricity quantity in megawatts."
        tests:
          - not_null

      - name: period_start
        description: "Start timestamp of the generation period."
        tests:
          - not_null

  - name: silver_day_ahead_prices
    description: "Cleaned and standardized ENTSO-E day-ahead electricity price data."
    columns:
      - name: price_date
        description: "Date extracted from the price period start timestamp."
        tests:
          - not_null

      - name: day_ahead_price
        description: "Day-ahead electricity market price."
        tests:
          - not_null

      - name: currency
        description: "Currency of the day-ahead price."
        tests:
          - not_null

      - name: price_unit
        description: "Unit of the price value."

  - name: gold_daily_generation
    description: "Daily aggregated electricity generation by production type."
    columns:
      - name: generation_date
        description: "Generation date."
        tests:
          - not_null

      - name: production_type
        description: "Electricity production type."
        tests:
          - not_null

      - name: total_generation_mw
        description: "Total daily electricity generation in megawatts."
        tests:
          - not_null

  - name: gold_generation_price_analysis
    description: "Business-ready analysis table combining daily generation totals with day-ahead electricity prices."
    columns:
      - name: generation_date
        description: "Generation date used to join generation and price data."
        tests:
          - not_null

      - name: production_type
        description: "Electricity production type."
        tests:
          - not_null

      - name: total_generation_mw
        description: "Total daily generation in megawatts."
        tests:
          - not_null

      - name: avg_day_ahead_price
        description: "Average day-ahead electricity price for the generation date."

      - name: price_per_mw_indicator
        description: "Analytical indicator comparing average day-ahead price against total generation volume."